<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RING Clinic — Invoice & Prescription</title>
  <style>
    /* ---------- Theme ---------- */
    :root{
      --ink:#0f172a;           /* slate-900 */
      --muted:#475569;         /* slate-600 */
      --line:#e2e8f0;          /* slate-200 */
      --soft:#f8fafc;          /* slate-50 */
      --brand:#183A3B;         /* sky-500 */
      --brand-ink:#183A3B;     /* sky-700 */
      --success:#16a34a;       /* green-600 */
      --danger:#dc2626;        /* red-600 */
    }

    /* ---------- Reset ---------- */
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      font:14px/1.5 "Inter", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      /* color:var(--ink); */
      color:#0f172a; /* slate-900 */
      background:white;
      margin:0;
    }
    
    /* ---------- Page Shell ---------- */
    .a4{width:210mm; margin:0 auto; background:white}
    .page{width:100%; min-height:297mm; padding:18mm 16mm; position:relative}
    /* .card{background:var(--soft); border:1px solid var(--line); border-radius:12px; padding:14px} */
    .card{background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; padding:14px}
    .grid{display:grid; gap:12px}
    .grid-2{grid-template-columns:1fr 1fr}

    h1,h2,h3{margin:0 0 6px; line-height:1.2}
    h1{font-size:20px}
    /* h2{font-size:16px; color:var(--brand-ink)} */
    h2{font-size:16px; color:#183A3B} /* brand ink */
    /* h3{font-size:13px; color:var(--muted)} */
    h3{font-size:13px; color:#475569} /* slate-600 */
    p{margin:4px 0}
    .muted{color:var(--muted)}
    .tight{margin:0}
    .mt-8{margin-top:8px}
    .mt-12{margin-top:12px}
    .mt-16{margin-top:16px}
    .badge{display:inline-block; padding:2px 8px; border-radius:999px; background:var(--brand); color:white; font-weight:600; font-size:12px; letter-spacing:.2px}

    /* ---------- Header ---------- */
    /* .header{display:flex; align-items:center; justify-content:space-between; gap:16px; border-bottom:2px solid var(--line); padding-bottom:10px; margin-bottom:12px} */
    .header{display:flex; align-items:center; justify-content:space-between; gap:16px; border-bottom:2px solid #e2e8f0; padding-bottom:10px; margin-bottom:12px}
    .logo-wrap{display:flex; align-items:center; gap:10px}
    .logo{height:34px; width:34px; border-radius:8px; background:linear-gradient(135deg, var(--brand), var(--brand-ink)); box-shadow:0 3px 8px rgba(2,132,199,.25)}
    .clinic-meta{font-size:12px}
    .doc-block{ text-align:right }
    .w-full{
      width: 100%!important;
    }
    /* ---------- Info blocks ---------- */
    .info{display:grid; grid-template-columns: 1.2fr .8fr .8fr; gap:12px}
    .kv{display:grid; grid-template-columns:120px 1fr; gap:6px; font-size:12.5px}
    .kv .k{color:var(--muted)}
    .kv .v{font-weight:600}

    /* ---------- Tables ---------- */
    table{width:100%; border-collapse:collapse; font-size:12.5px}
    /* thead th{background:var(--soft); color:var(--muted); text-align:left; border-bottom:1px solid var(--line); padding:8px} */
    thead th{background:#f8fafc; color:#475569; text-align:left; border-bottom:1px solid #e2e8f0; padding:8px}
    /* tbody td{border-bottom:1px solid var(--line); padding:8px; vertical-align:top} */
    tbody td{border-bottom:1px solid #e2e8f0; padding:8px; vertical-align:top}
    tfoot td{padding:6px 8px}
    .num{text-align:right; white-space:nowrap}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace}

    /* .totals{margin-left:auto; width: min(70%, 340px)} */
    .totals{margin-left:auto; width:70%; max-width:340px}
    .totals tr td{border-bottom:0}
    .totals tr td:first-child{color:var(--muted)}
    /* .totals .grand td{border-top:2px solid var(--ink); font-weight:800} */
    .totals .grand td{border-top:2px solid #0f172a; font-weight:800}

    /* .amount-words{font-size:12.5px; background:var(--soft); border:1px dashed var(--line); padding:8px; border-radius:8px} */
    .amount-words{font-size:12.5px; background:#f8fafc; border:1px dashed #e2e8f0; padding:8px; border-radius:8px}


    /* ---------- Meta rows ---------- */
    .meta-row{display:grid; grid-template-columns:1fr 1fr; gap:12px}

    /* ---------- Signatures ---------- */
    .signs{display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-top:18px}
    /* .sig{height:72px; border-top:1px solid var(--line); display:flex; align-items:flex-end; justify-content:space-between; padding-top:8px; color:var(--muted); font-size:12px} */
    .sig{height:72px; border-top:1px solid #e2e8f0; display:flex; align-items:flex-end; justify-content:space-between; padding-top:8px; color:#475569; font-size:12px}
    /* ---------- Footer ---------- */
    .footer{position:absolute; bottom:10mm; left:16mm; right:16mm; display:flex; justify-content:space-between; color:var(--muted); font-size:11px}

    /* ---------- Page breaks ---------- */
    .page-break{page-break-before:always}
    @media print{
      body{background:white}
      .a4{width:auto}
      .page{padding:14mm 12mm}
      thead{display:table-header-group}
      tfoot{display:table-footer-group}
      .card{border-color:#dfe6ef}
      .footer{position:fixed}
      .no-print{display:none !important}
    }
  </style>
</head>
<body>VAR_ITEM_DATA</body>
</html>
